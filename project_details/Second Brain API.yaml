components:
  schemas:
    Bookmark:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          maxLength: 2000
        title:
          type: string
          maxLength: 500
        content:
          type: string
        progress:
          type: string
          maxLength: 255
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
          nullable: true
        folder:
          type: integer
          nullable: true
        is_favorite:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_opened:
          type: string
          format: date-time
          nullable: true
      required:
      - category_name
      - created_at
      - id
      - updated_at
    BookmarkFolder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        bookmark_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - bookmark_count
      - created_at
      - id
      - name
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        notes:
          type: string
        color:
          type: string
          maxLength: 10
        date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          nullable: true
        end_time:
          type: string
          format: time
          nullable: true
        time_of_day:
          $ref: '#/components/schemas/CalendarEventTimeOfDayEnum'
        is_all_day:
          type: boolean
        recurrence:
          $ref: '#/components/schemas/RecurrenceEnum'
        recurrence_end:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        linked_step:
          type: integer
          nullable: true
        linked_step_status:
          type: string
          readOnly: true
      required:
      - created_at
      - date
      - id
      - linked_step_status
      - title
    CalendarEventTimeOfDayEnum:
      enum:
      - morning
      - afternoon
      - evening
      - allday
      type: string
      description: |-
        * `morning` - Morning
        * `afternoon` - Afternoon
        * `evening` - Evening
        * `allday` - All Day
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    ColorEnum:
      enum:
      - yellow
      - blue
      - green
      - red
      - purple
      - orange
      type: string
      description: |-
        * `yellow` - #FFD60A
        * `blue` - #0A84FF
        * `green` - #32D74B
        * `red` - #FF453A
        * `purple` - #BF5AF2
        * `orange` - #FF9F0A
    EventTypeEnum:
      enum:
      - meeting
      - reminder
      - learning_session
      - task
      - exercise
      - other
      type: string
      description: |-
        * `meeting` - Meeting
        * `reminder` - Reminder
        * `learning_session` - Learning Session
        * `task` - Task
        * `exercise` - Exercise
        * `other` - Other
    Folder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        note_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - note_count
    FrequencyEnum:
      enum:
      - daily
      - weekly
      type: string
      description: |-
        * `daily` - Daily
        * `weekly` - Weekly
    Habit:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        frequency:
          $ref: '#/components/schemas/FrequencyEnum'
        color:
          $ref: '#/components/schemas/ColorEnum'
        time_of_day:
          $ref: '#/components/schemas/HabitTimeOfDayEnum'
        weekdays:
          type: string
          maxLength: 20
        target_value:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        streak:
          type: string
          readOnly: true
        completed_today:
          type: string
          readOnly: true
        total_completions:
          type: string
          readOnly: true
        sub_items:
          type: array
          items:
            $ref: '#/components/schemas/RoutineSubItem'
          readOnly: true
        actual_today:
          type: string
          readOnly: true
        completion_rate_today:
          type: string
          readOnly: true
        is_available_today:
          type: string
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        recent_logs:
          type: string
          readOnly: true
      required:
      - actual_today
      - completed_today
      - completion_rate_today
      - created_at
      - id
      - is_available_today
      - name
      - recent_logs
      - streak
      - sub_items
      - total_completions
    HabitTimeOfDayEnum:
      enum:
      - anytime
      - morning
      - afternoon
      - evening
      - night
      type: string
      description: |-
        * `anytime` - Anytime
        * `morning` - Morning
        * `afternoon` - Afternoon
        * `evening` - Evening
        * `night` - Night
    LearningPath:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        color:
          type: string
          maxLength: 10
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PathStep'
          readOnly: true
        total_steps:
          type: integer
          readOnly: true
        done_steps:
          type: string
          readOnly: true
      required:
      - created_at
      - done_steps
      - id
      - name
      - steps
      - total_steps
      - updated_at
    Note:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        body:
          type: string
        tags:
          type: string
          maxLength: 500
        folder:
          type: integer
          nullable: true
        created_at:
          type: string
